<!-- templates/user_scores.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classement des Utilisateurs</title>
        <!-- Bootstrap CSS -->
    <link rel="stylesheet" href=
"https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" />

    <!-- Bootstrap Font Icon CSS -->
    <link rel="stylesheet" href=
"https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" />
</head>
<body>
    <!-- Importer la barre de navigation -->
    {% include 'menu.html' %}

    <div class="container mt-5">
        <h1>Classement des Utilisateurs</h1>
        <table class="table">
            <thead>
                <tr>
                    <th>Rang</th>
                    <th>Username</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                    <tr>
                        <td>
                            {% if loop.index == 1 %}
                                <i class="bi bi-trophy text-warning"></i>
                            {% elif loop.index == 2 %}
                                <i class="bi bi-trophy text-secondary"></i>
                            {% elif loop.index == 3 %}
                                <i class="bi bi-trophy text-danger"></i>
                            {% endif %}
                            {{ loop.index }}
                        </td>
                        <td>{{ user.user }}</td>
                        <td>{{ user.score }}</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
