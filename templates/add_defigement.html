<!-- templates/add_defigement.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un Nouveau Défigement</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item active">
                    <a class="nav-link" href="/">Ajouter un Défigement</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/all">Tous les Défigements</a>
                </li>
            </ul>
        </div>
    </nav>
    <div class="container mt-5">
        <h5>Défigez le figement suivant :</h5>
        <h4>{{ defigement.text }}</h4>
        <form id="addDefigementForm" class="mt-3">
            <div class="form-group">
                <label for="defigement_str">Nouveau Défigement:</label>
                <input type="text" name="defigement_str" class="form-control" required>
            </div>
            <input type="hidden" name="figement_id" value="{{ defigement.id }}">
            <button type="button" onclick="addDefigement()" class="btn btn-primary">Ajouter</button>
        </form>

        <!-- Bootstrap Success Popup -->
        <div class="modal fade" id="successPopup" tabindex="-1" role="dialog" aria-labelledby="successPopupLabel" aria-hidden="true">
            <div class="modal-dialog" role="document">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="successPopupLabel">Succès</h5>
                        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                    <div class="modal-body">
                        Le défigement a été ajouté avec succès !
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Fermer</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function addDefigement() {
            const form = document.getElementById('addDefigementForm');
            const formData = new FormData(form);

            try {
                const response = await fetch('/add_defigement/', {
                    method: 'POST',
                    body: formData,
                });

                if (response.ok) {
                    // Afficher la popup de succès
                    $('#successPopup').modal('show');
                    // Réinitialiser le champ de texte après l'ajout réussi
                    form.reset();
                } else {
                    console.error('Échec de la requête AJAX');
                }
            } catch (error) {
                console.error('Erreur lors de l\'envoi de la requête AJAX', error);
            }
        }
    </script>

    <!-- Bootstrap JS and Popper.js (Required for Bootstrap) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
